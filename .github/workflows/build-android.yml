name: Build & Sign Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate signing secret
        run: |
          if [ -z "${{ env.KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not set. Build cannot proceed without the permanent signing key."
            exit 1
          fi
          echo "Signing secret found."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Restore permanent signing keystore
        run: |
          echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > android/guardtrack-release-key.jks
          echo "Keystore restored from secret:"
          ls -lh android/guardtrack-release-key.jks

      - name: Write keystore.properties
        run: |
          printf 'storePassword=GuardTrackStore2024\nkeyPassword=GuardTrackStore2024\nkeyAlias=guardtrack-key\nstoreFile=../guardtrack-release-key.jks\n' \
            > android/keystore.properties
          echo "keystore.properties written."

      - name: Build signed release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-build-cache

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-release-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
