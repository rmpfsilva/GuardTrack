name: Build & Sign Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Generate or restore keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Restoring keystore from secret..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/guardtrack-release-key.jks
            echo "Keystore restored successfully ($(du -sh android/guardtrack-release-key.jks | cut -f1))"
          else
            echo "No KEYSTORE_BASE64 secret found — generating a new keystore..."
            keytool -genkeypair \
              -keystore android/guardtrack-release-key.jks \
              -alias guardtrack-key \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "GuardTrack@Store2024!" \
              -keypass "GuardTrack@Key2024!" \
              -dname "CN=GuardTrack,O=ProForce,L=London,C=GB" \
              -noprompt
            echo "Keystore generated!"
            echo ""
            echo "================================================================"
            echo "IMPORTANT — Copy the text below and save it as the"
            echo "KEYSTORE_BASE64 secret in GitHub Settings > Secrets."
            echo "You only need to do this once."
            echo "================================================================"
            base64 -w 0 android/guardtrack-release-key.jks
            echo ""
            echo "================================================================"
          fi

      - name: Write keystore.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            'GuardTrack@Store2024!' \
            'GuardTrack@Key2024!' \
            'guardtrack-key' \
            '../guardtrack-release-key.jks' \
            > android/keystore.properties

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload keystore artifact (save this on first run)
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-keystore
          path: android/guardtrack-release-key.jks
          retention-days: 90
