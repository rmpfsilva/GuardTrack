name: Build & Sign Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Generate keystore (PKCS12 format)
        run: |
          keytool -genkeypair \
            -keystore android/guardtrack-release-key.jks \
            -storetype PKCS12 \
            -alias guardtrack-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass GuardTrackStore2024 \
            -keypass GuardTrackKey2024 \
            -dname "CN=GuardTrack,O=ProForce,L=London,C=GB" \
            -noprompt
          echo "Keystore generated (PKCS12 format):"
          ls -lh android/guardtrack-release-key.jks

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties << 'EOF'
          storePassword=GuardTrackStore2024
          keyPassword=GuardTrackKey2024
          keyAlias=guardtrack-key
          storeFile=../guardtrack-release-key.jks
          EOF

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-build-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-keystore-run-${{ github.run_number }}
          path: android/guardtrack-release-key.jks
          retention-days: 90
