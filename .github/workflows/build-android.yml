name: Build & Sign Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Restore keystore from secret
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/guardtrack-release-key.jks
          echo "Keystore restored ($(du -sh android/guardtrack-release-key.jks | cut -f1))"

      - name: Generate keystore (first run — no secret yet)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          keytool -genkeypair \
            -keystore android/guardtrack-release-key.jks \
            -alias guardtrack-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "GuardTrack@Store2024!" \
            -keypass "GuardTrack@Key2024!" \
            -dname "CN=GuardTrack,O=ProForce,L=London,C=GB" \
            -noprompt
          echo "Keystore generated!"
          echo ""
          echo "========================================================"
          echo "SAVE THIS — paste it as the KEYSTORE_BASE64 GitHub secret"
          echo "========================================================"
          base64 -w 0 android/guardtrack-release-key.jks
          echo ""
          echo "========================================================"

      - name: Write keystore.properties
        run: |
          printf 'storePassword=GuardTrack@Store2024!\nkeyPassword=GuardTrack@Key2024!\nkeyAlias=guardtrack-key\nstoreFile=../guardtrack-release-key.jks\n' \
            > android/keystore.properties

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload keystore artifact (save this on first run)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: guardtrack-keystore-SAVE-THIS
          path: android/guardtrack-release-key.jks
          retention-days: 90
