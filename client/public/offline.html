<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuardTrack - Offline</title>
    <meta name="theme-color" content="#2563eb" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }
      .container { max-width: 360px; }
      .icon {
        width: 80px;
        height: 80px;
        background: #1e3a5f;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2.5rem;
      }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #f8fafc; }
      p { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; margin-bottom: 1.5rem; }
      button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      button:active { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <img src="/icon-192.png" alt="GuardTrack" width="60" height="60" style="border-radius:14px" onerror="this.style.display='none';this.parentElement.textContent='GT'" />
      </div>
      <h1>You are offline</h1>
      <p>GuardTrack needs an internet connection to load. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
